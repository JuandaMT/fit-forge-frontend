<section class="fp-page">
  <aside class="fp-info">
    <div class="fp-info-inner">
      <a routerLink="/" class="fp-brand">FitForge</a>

      <div class="fp-copy">
        <h1 class="fp-title">Vuelve a<br />tu cuenta</h1>
        <p class="fp-subtitle">Recupera tu acceso y continúa con tu progreso donde lo dejaste.</p>
      </div>
    </div>
  </aside>

  <main class="fp-form-side">
    <div class="fp-form-wrap">
      <a routerLink="/login" class="fp-back">Volver a iniciar sesión</a>

      <div class="fp-head">
        <h2>Recuperar contraseña</h2>
        <p>Introduce el email asociado a tu cuenta y te enviaremos las instrucciones.</p>
      </div>

      <form class="fp-form">
        <div class="fp-field">
          <label for="email">Email</label>
          <input
            id="email"
            name="email"
            type="email"
            autocomplete="email"
            placeholder="tu@email.com"
          />
        </div>

        <button type="button" class="fp-submit">Enviar instrucciones</button>
      </form>
    </div>
  </main>
</section>
